version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rag_postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333" # gRPC
      - "6334:6334" # REST
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: rag_minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    env_file:
      - .env
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  create-minio-bucket:
    image: minio/mc
    container_name: rag_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; /usr/bin/mc mb myminio/${MINIO_BUCKET_NAME} --ignore-existing; /usr/bin/mc policy set download myminio/${MINIO_BUCKET_NAME}; exit 0; "
    env_file:
      - .env

  backend:
    build: .
    container_name: rag_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - EMBEDDING_SERVICE_URL=http://embedding_service:8001
      - DATABASE_URL=postgresql://raguser:ragpassword@postgres:5432/rag_db
      - MINIO_ENDPOINT=minio:9000
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
      - embedding_service
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    container_name: rag_celery_worker
    command: celery -A app.core.celery_app worker --loglevel=info -Q celery
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - EMBEDDING_SERVICE_URL=http://embedding_service:8001
      - DATABASE_URL=postgresql://raguser:ragpassword@postgres:5432/rag_db
      - MINIO_ENDPOINT=minio:9000
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
      - embedding_service
    restart: unless-stopped

  embedding_service:
    build: .
    container_name: rag_embedding_service
    command: uvicorn app.embedding_service.main:app --host 0.0.0.0 --port 8001
    volumes:
      - .:/app
      - huggingface_cache:/root/.cache/huggingface
    env_file:
      - .env
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  huggingface_cache:
