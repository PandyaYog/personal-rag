[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
user=user

[program:backend]
command=uvicorn main:app --host 0.0.0.0 --port 7860
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autostart=true
autorestart=true

[program:celery]
command=celery -A app.core.celery_app worker --loglevel=info -Q celery
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autostart=true
autorestart=true
